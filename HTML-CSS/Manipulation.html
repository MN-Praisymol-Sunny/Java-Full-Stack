
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cake</title>
    <link rel="stylesheet" href="Manipulation.css">

</head>
<body>
    <div class="scene">
        <header>
            <h1 id="wish">HAPPY BIRTHDAY</h1>
        </header>
        <div class="content">
            <div class="cake-card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTwvHaIOV0b1awoY71O0a9KzCgrduE2VxfNEQ&s" alt="Birthday cake">
                <audio src="Files/song,mp3.mp3"></audio>
            </div>
            <div class="message-container">
                <p class="sliding-text">
                    <b>This cake is for the person having birthday today.</b><br>
                    <b>Wishing you many more happy returns of the day.</b>
                </p>
            </div>
             <script src="Manipulation.js"></script>
        </div>
        <div class="balloon balloon1"></div>
        <div class="balloon balloon2"></div>
        <div class="balloon balloon3"></div>
        <div class="balloon balloon4"></div>
        <div class="confetti c1"></div>
        <div class="confetti c2"></div>
        <div class="confetti c3"></div>
        <div class="confetti c4"></div>
        <div class="confetti c5"></div>
    </div>
</body>
</html>
